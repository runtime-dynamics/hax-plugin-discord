name: discord
version: 0.0.1
description: Bi-directional Discord communication plugin for Hyperax
type: service
author: Hyperax
license: Apache-2.0
source_repo: github.com/nitecon/hax-plugin-discord
min_hyperax_version: "1.0.0"
api_version: "1"
entrypoint: hax-plugin-discord
integration: channel
approval_required: true

permissions:
  - network:*
  - tools:register

variables:
  - name: DISCORD_BOT_TOKEN
    type: string
    required: true
    secret: true
    description: Discord bot authentication token
  - name: DISCORD_GUILD_ID
    type: string
    required: false
    description: Default guild ID for operations that don't specify one
  - name: DISCORD_CHANNELS
    type: array_string
    required: false
    dynamic: true
    default: []
    description: Discord channel IDs to monitor for messages
  - name: DISCORD_MIRROR_CHANNEL
    type: string
    required: false
    description: Channel ID to mirror chat output to
  - name: DISCORD_LOG_LEVEL
    type: string
    required: false
    description: Log level (debug, info, warn, error)
    default: info

resources:
  - type: cron_job
    name: discord_channel_watcher
    config:
      schedule: "*/30 * * * * *"
      job_type: tool
      payload:
        tool: plugin_discord_poll_channels

tools:
  - name: discord_send_message
    description: Send a message to a Discord channel
    parameters:
      - name: channel_id
        type: string
        required: true
        description: Discord channel ID to send the message to
      - name: content
        type: string
        required: true
        description: Message text content
      - name: embed
        type: object
        required: false
        description: Optional rich embed object

  - name: discord_read_history
    description: Read message history from a Discord channel
    parameters:
      - name: channel_id
        type: string
        required: true
        description: Discord channel ID
      - name: limit
        type: integer
        required: false
        description: Number of messages to fetch (1-100, default 25)
      - name: before_id
        type: string
        required: false
        description: Fetch messages before this message ID

  - name: discord_list_channels
    description: List channels in a Discord guild
    parameters:
      - name: guild_id
        type: string
        required: false
        description: Guild ID (uses default if omitted)

  - name: discord_list_guilds
    description: List all guilds the bot is a member of
    parameters: []

  - name: discord_get_message
    description: Get a specific message by ID from a channel
    parameters:
      - name: channel_id
        type: string
        required: true
        description: Discord channel ID
      - name: message_id
        type: string
        required: true
        description: Message ID to retrieve

  - name: discord_react
    description: Add a reaction emoji to a message
    parameters:
      - name: channel_id
        type: string
        required: true
        description: Discord channel ID
      - name: message_id
        type: string
        required: true
        description: Message ID to react to
      - name: emoji
        type: string
        required: true
        description: Emoji to react with (Unicode or custom format name:id)

  - name: discord_create_thread
    description: Create a new thread in a channel, optionally as a reply to a message
    parameters:
      - name: channel_id
        type: string
        required: true
        description: Parent channel ID
      - name: name
        type: string
        required: true
        description: Thread name
      - name: message_id
        type: string
        required: false
        description: Optional message ID to create thread from

  - name: discord_poll_channels
    description: Poll monitored channels for new messages (used by cron watcher)
    parameters: []

events:
  - type: discord.message_received
    description: Emitted when a message is received in an allowed channel
  - type: discord.reaction_added
    description: Emitted when a reaction is added to a message in an allowed channel
  - type: discord.member_joined
    description: Emitted when a new member joins a guild

health_check:
  interval: 30s
  timeout: 5s
