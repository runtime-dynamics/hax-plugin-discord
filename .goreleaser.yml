version: 2

project_name: hax-plugin-discord

before:
  hooks:
    - go mod tidy

builds:
  - id: hax-plugin-discord
    binary: hax-plugin-discord
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - hyperax-plugin.yaml
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

release:
  extra_files:
    - glob: hyperax-plugin.yaml

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
